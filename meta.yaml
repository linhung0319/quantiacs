package:
  name: "qnt"
  version: "0.0.501"

source:
  path: .

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv "

requirements:
  host:
  - pip
  - python >=3.10,<3.14
  - setuptools

  run:
    - scipy<=1.14.0
    - pandas=2.2.3
    - xarray<=2025.3.1
    - bottleneck=1.4.2
    - numpy<2.3.0
    - numba<=0.61.2
    - tabulate=0.9.*
    - python>=3.10,<3.14
    - progressbar2=3.*
    - cftime=1.6.*
    - plotly=6.0.*
    - matplotlib<=3.10.1
  #  - conda-forge::dash=3.0.*
  #  - conda-forge::python-avro=1.8.*
  #  - conda-forge::ta-lib
  #  - conda-forge::dash

about:
  license: MIT
  home: https://quantnet.ai