package:
  name: "qnt"
  version: "0.0.505"

source:
  path: .

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv"

requirements:
  host:
    - pip
    - python >=3.10,<3.14
    - setuptools
  run:
    - python >=3.10,<3.14
    - scipy >=1.14.0,<2.0.0
    - pandas >=2.2,<2.3
    - xarray >=2024.11.0,<2026.0.0
    - numpy >=1.26.0,<2.3.0
    - tabulate >=0.9.0,<1.0.0
    - bottleneck >=1.4.2,<2.0.0
    - numba >=0.59.0,<1.0.0
    - progressbar2 >=3.55,<5
    - cftime >=1.6.4,<2.0.0
    - plotly >=5.22,<7.0
    - matplotlib >=3.10.0,<4.0.0

about:
  home: https://quantiacs.com
  license: MIT
